spring:
  datasource:
    url: jdbc:h2:mem:inventorydb;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

supplier:
  base-url: http://localhost:9999

# Smaller windows/timeouts than production so integration tests trip the CircuitBreaker and
# TimeLimiter quickly instead of waiting on production-sized durations.
resilience4j:
  circuitbreaker:
    instances:
      supplierService:
        slidingWindowSize: 4
        minimumNumberOfCalls: 4
        waitDurationInOpenState: 2s
  retry:
    instances:
      supplierService:
        maxAttempts: 2
        waitDuration: 50ms
  timelimiter:
    instances:
      supplierService:
        timeoutDuration: 500ms
