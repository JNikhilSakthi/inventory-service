server:
  port: 8081

spring:
  application:
    name: external-mock-service

mock:
  chaos:
    failure-rate: ${MOCK_CHAOS_FAILURE_RATE:0.3}
    min-delay-ms: ${MOCK_CHAOS_MIN_DELAY_MS:50}
    max-delay-ms: ${MOCK_CHAOS_MAX_DELAY_MS:800}
    force-failure: ${MOCK_CHAOS_FORCE_FAILURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.medha.externalmockservice: INFO
